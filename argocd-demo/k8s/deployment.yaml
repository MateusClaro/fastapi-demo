apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: fastapi-demo
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      app: fastapi-demo
  template:
    metadata:
      labels:
        app: fastapi-demo
    spec:
      containers:
        - name: fastapi-demo
          image: fastapi-demo:v5
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
  strategy:
    canary:
      steps:
        - setWeight: 25    # 1 pod v2 (25%)
        - pause: {}        # pausa — aguarda aprovação manual
        - setWeight: 50    # 2 pods v2
        - pause: {}        # pausa novamente
        - setWeight: 100   # todos os pods v2
